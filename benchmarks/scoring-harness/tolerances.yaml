    ctrl_median_os:
      absolute: 0.5    # ±0.5 months
      weight: 0.10
    ctrl_hr:
      absolute: 0.05
      weight: 0.08
    ctrl_event_rate:
      absolute: 0.02
      weight: 0.05
    ctrl_logrank_p:
      absolute: 0.005
      weight: 0.05
    exp_median_os:
      absolute: 0.5
      weight: 0.10
    exp_hr:
      absolute: 0.05
      weight: 0.08
    exp_event_rate:
      absolute: 0.02
      weight: 0.05
    exp_logrank_p:
      absolute: 0.005
      weight: 0.05
    censoring_rate:
      absolute: 0.02
      weight: 0.05
    subgroup_median:
