# tolerances.yaml — Per-test-case numerical tolerance specifications
# Part of the ASA Biopharm AI/ML WG Agentic AI Benchmark
# Reference: benchmarks/cross-language-verification.md §4.2

TC-001:
  description: "KM Median PFS Estimation"
  tolerances:
    median_pfs:
      absolute: 0.05
      relative: 0.001
      weight: 0.40
    ci_lower:
      absolute: 0.05
      relative: 0.001
      weight: 0.20
    ci_upper:
      absolute: 0.05
      relative: 0.001
      weight: 0.20
      allow_null: true   # NA when survival never crosses 0.5
    n_events:
      absolute: 0       # exact match
      weight: 0.10
    n_total:
      absolute: 0       # exact match
      weight: 0.10

TC-002:
  description: "Baseline Demographics Table"
  tolerances:
    mean:
      absolute: 0.05
      relative: 0.01
      weight: 0.30
    std:
      absolute: 0.05
      relative: 0.01
      weight: 0.20
    median:
      absolute: 0.05
      relative: 0.01
      weight: 0.15
    count:
      absolute: 0       # exact match
      weight: 0.20
    pct:
      absolute: 0.1
      relative: 0.01
      weight: 0.15

TC-003:
  description: "Stratified Log-Rank Test"
  tolerances:
    chi_square:
      absolute: 0.01
      relative: 0.001
      weight: 0.40
    p_value:
      absolute: 0.001
      relative: 0.01
      weight: 0.40
    n_events:
      absolute: 0       # exact match
      weight: 0.10
    n_total:
      absolute: 0       # exact match
      weight: 0.10

TC-011:
  description: "AE Summary Table by SOC and PT"
  tolerances:
    # Summary row counts (Any AE, SAE, AE leading to discontinuation)
    summary_n:
      absolute: 0       # exact match
      weight: 0.25
    summary_pct:
      absolute: 0.1     # ±0.1 percentage points
      weight: 0.15
    # Detailed AE table SOC-level counts
    ae_table_n:
      absolute: 0       # exact match
      weight: 0.30
    ae_table_pct:
      absolute: 0.1
      weight: 0.20
    # Overall N per arm
    n_per_arm:
      absolute: 0       # exact match
      weight: 0.10

TC-012:
  description: "Forest Plot — Subgroup Hazard Ratios"
  tolerances:
    # Overall HR
    overall_hr:
      absolute: 0.05
      relative: 0.02
      weight: 0.25
    overall_ci:
      absolute: 0.05
      relative: 0.02
      weight: 0.15
    # Subgroup HRs (averaged across all subgroups)
    subgroup_hr:
      absolute: 0.05
      relative: 0.05
      weight: 0.30
    subgroup_ci:
      absolute: 0.05
      relative: 0.05
      weight: 0.20
    # Event counts per subgroup
    subgroup_n:
      absolute: 0       # exact match
      weight: 0.10

TC-013:
  description: "Waterfall Plot — Best % Tumor Change (RECIST 1.1)"
  tolerances:
    # Response category counts (per arm: all, experimental, control)
    response_n:
      absolute: 0       # exact match for CR/PR/SD/PD counts
      weight: 0.30
    # ORR and DCR percentages
    orr_pct:
      absolute: 0.1
      weight: 0.15
    dcr_pct:
      absolute: 0.1
      weight: 0.15
    # Median and mean best % change
    median_pct_change:
      absolute: 0.1
      weight: 0.20
    mean_pct_change:
      absolute: 0.1
      weight: 0.20

TC-014:
  description: "Listing of Key Protocol Deviations"
  tolerances:
    # Overall counts
    n_subjects_with_pd:
      absolute: 0       # exact match
      weight: 0.25
    n_total_deviations:
      absolute: 0       # exact match
      weight: 0.20
    # By-category counts
    by_category_n:
      absolute: 0       # exact match
      weight: 0.25
    # By-severity counts
    by_severity_n:
      absolute: 0       # exact match
      weight: 0.20
    # N per arm
    n_per_arm:
      absolute: 0       # exact match
      weight: 0.10

TC-015:
  description: "KM Curve with Risk Table"
  tolerances:
    # Overall median survival
    overall_median:
      absolute: 0.1
      relative: 0.01
      weight: 0.15
    # Log-rank test
    logrank_chisq:
      absolute: 0.05
      relative: 0.01
      weight: 0.15
    logrank_p:
      absolute: 0.005
      relative: 0.01
      weight: 0.10
    # Survival probabilities at time points (averaged)
    survival_probs:
      absolute: 0.01    # ±0.01 on survival probability
      relative: 0.02
      weight: 0.25
    # Numbers at risk (exact match required)
    n_at_risk:
      absolute: 2       # allow ±2 due to censoring order differences
      weight: 0.20
    # Metadata
    n_total:
      absolute: 0
      weight: 0.05
    events_total:
      absolute: 0
      weight: 0.10

TC-016:
  description: "Exposure Summary Table"
  tolerances:
    # Treatment duration stats (mean, sd, median per arm)
    duration_stats:
      absolute: 0.5     # ±0.5 weeks
      relative: 0.02
      weight: 0.25
    # Cumulative dose stats
    cumdose_stats:
      absolute: 50      # ±50 mg cumulative
      relative: 0.02
      weight: 0.20
    # Dose intensity stats
    doseint_stats:
      absolute: 1.0     # ±1 percentage point
      relative: 0.02
      weight: 0.25
    # Dose reduction counts
    dose_reduction_n:
      absolute: 2       # ±2 subjects
      weight: 0.15
    dose_reduction_pct:
      absolute: 1.0
      weight: 0.10
    # N per arm
    n_per_arm:
      absolute: 0
      weight: 0.05

TC-017:
  description: "Laboratory Shift Table"
  tolerances:
    # Shift cell counts (3x3 matrix: exact match)
    shift_counts:
      absolute: 2       # ±2 per cell due to borderline values
      weight: 0.40
    # Summary shift counts
    summary_counts:
      absolute: 2
      weight: 0.25
    # Percentages
    percentages:
      absolute: 1.0     # ±1 percentage point
      relative: 0.05
      weight: 0.20
    # N per arm
    n_per_arm:
      absolute: 0
      weight: 0.10
    # Overall N
    n_total:
      absolute: 0
      weight: 0.05

