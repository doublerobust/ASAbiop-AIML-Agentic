# compliance.yaml — Regulatory Compliance Rules per Test Case
# Part of the ASA Biopharm AI/ML WG Agentic AI Benchmark
# Reference: benchmarks/regulatory-compliance.md

# ─────────────────────────────────────────────────────
# TC-001: Kaplan-Meier Median PFS Estimation
# ─────────────────────────────────────────────────────
TC-001:
  description: "KM Median PFS Estimation — single arm, ITT population"
  adam_mapping:
    required_variables: [AVAL, CNSR, TRT01PN, ITTFL]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-03
      desc: "CNSR 0=event 1=censored"
      critical: true
    - id: TCG-04
      desc: "Analysis time AVAL specified"
      critical: true
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-03
      desc: "Method in footnotes"
      penalty: 0.1
    - id: CSR-05
      desc: "CI method documented"
      penalty: 0.2

# ─────────────────────────────────────────────────────
# TC-002: Baseline Demographics Table (Safety Population)
# ─────────────────────────────────────────────────────
TC-002:
  description: "Baseline Demographics Table — safety population, descriptive stats"
  adam_mapping:
    required_variables: [AGE, SEX, RACE, REGION1, ECOG, TRT01PN, SAFFL]
    population_flag: SAFFL
    population_value: Y
    treatment_variable: TRT01PN
  tcg_rules:
    - id: TCG-01
      desc: "Population filter SAFFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes documented"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-003: Stratified Log-Rank Test
# ─────────────────────────────────────────────────────
TC-003:
  description: "Stratified Log-Rank Test — ITT population, 2 stratification factors"
  adam_mapping:
    required_variables: [AVAL, CNSR, TRT01PN, SEX, ECOG, ITTFL]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
    strata_variables: [SEX, ECOG]
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-03
      desc: "CNSR 0=event 1=censored"
      critical: true
    - id: TCG-05
      desc: "Statistical method documented"
      critical: false
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-04
      desc: "p-value type 1/2-sided documented"
      penalty: 0.2
    - id: CSR-05
      desc: "CI method documented"
      penalty: 0.2
    - id: CSR-03
      desc: "Method in footnotes"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-011: Adverse Event Summary Table by SOC and PT
# ─────────────────────────────────────────────────────
TC-011:
  description: "AE Summary Table by SOC/PT — safety population, MedDRA coding"
  adam_mapping:
    required_variables: [USUBJID, AEDECOD, AEBODSYS, AESER, AEACN, TRT01PN, SAFFL]
    population_flag: SAFFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADAE
  tcg_rules:
    - id: TCG-01
      desc: "Population filter SAFFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-07
      desc: "AE domain (ADAE) used as source"
      critical: true
    - id: TCG-08
      desc: "MedDRA SOC (AEBODSYS) and PT (AEDECOD) present"
      critical: true
    - id: TCG-09
      desc: "Serious AE flag (AESER) present for SAE summary row"
      critical: true
    - id: TCG-10
      desc: "AE action (AEACN) present for discontinuation summary row"
      critical: true
    - id: TCG-11
      desc: "Subject-level de-duplication: each subject counted once per PT"
      critical: true
    - id: TCG-12
      desc: "SOC sorted alphabetically or by descending frequency"
      critical: false
    - id: TCG-13
      desc: "PT sorted by descending frequency within SOC"
      critical: false
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes safety population"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: 95% CI method for percentages, MedDRA version"
      penalty: 0.1
    - id: CSR-06
      desc: "Summary rows: Any AE, SAE, AEs leading to discontinuation"
      penalty: 0.15
    - id: CSR-07
      desc: "Denominator (N) per treatment arm in column headers"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-012: Forest Plot — Subgroup Hazard Ratios
# ─────────────────────────────────────────────────────
TC-012:
  description: "Forest Plot HRs — Cox PH subgroup analysis, ITT population"
  adam_mapping:
    required_variables: [AVAL, CNSR, TRT01PN, ITTFL, AGE, SEX, ECOG, REGION1, PRIORTX]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADTTE + ADSL
    subgroup_variables: [AGEGRP, SEX, ECOG, REGION1, PRIORTX]
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-03
      desc: "CNSR 0=event 1=censored"
      critical: true
    - id: TCG-04
      desc: "Analysis time AVAL specified"
      critical: true
    - id: TCG-14
      desc: "Cox PH model: treatment as sole covariate per subgroup"
      critical: true
    - id: TCG-15
      desc: "All predefined subgroups present (age, sex, ECOG, region, prior therapy)"
      critical: true
    - id: TCG-16
      desc: "Interaction p-values computed for each subgroup"
      critical: false
    - id: TCG-17
      desc: "HR computed as exp(beta) with 95% CI from Wald"
      critical: true
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-03
      desc: "Method in footnotes: Cox PH model specification"
      penalty: 0.1
    - id: CSR-05
      desc: "CI method documented (Wald or likelihood-based)"
      penalty: 0.2
    - id: CSR-08
      desc: "Forest plot includes overall HR and subgroup HRs"
      penalty: 0.15
    - id: CSR-09
      desc: "Interaction p-values reported alongside subgroup HRs"
      penalty: 0.1
    - id: CSR-10
      desc: "Subgroup sample sizes (n per arm) reported"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-013: Waterfall Plot — Best % Change in Tumor Size
# ─────────────────────────────────────────────────────
TC-013:
  description: "Waterfall Plot — RECIST 1.1 response categorization, efficacy"
  adam_mapping:
    required_variables: [USUBJID, TRT01PN, AVAL, BASE, CHG, PCHG, ITTFL, PARAMCD]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADRS or ADTR (tumor response)
    paramcd_filter: "SUMDIAM or TUMSUM"
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-18
      desc: "Best % change from baseline (PCHG) computed per subject"
      critical: true
    - id: TCG-19
      desc: "RECIST 1.1 thresholds applied: CR=-100%, PR<=-30%, PD>=+20%, SD=other"
      critical: true
    - id: TCG-20
      desc: "Subjects with no baseline or no post-baseline excluded"
      critical: true
    - id: TCG-21
      desc: "Best response = most extreme negative PCHG (most shrinkage)"
      critical: true
    - id: TCG-22
      desc: "ORR = CR+PR, DCR = CR+PR+SD computed correctly"
      critical: true
    - id: TCG-23
      desc: "Subjects sorted by descending best % change for waterfall"
      critical: false
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Figure numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population and response criteria (RECIST 1.1)"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: ORR/DCR definitions, 95% CI method"
      penalty: 0.1
    - id: CSR-11
      desc: "X-axis: subject ID sorted by best % change"
      penalty: 0.1
    - id: CSR-12
      desc: "Reference lines at -30% (PR threshold) and +20% (PD threshold)"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-014: Listing of Key Protocol Deviations
# ─────────────────────────────────────────────────────
TC-014:
  description: "PD Listing — protocol deviations by category and severity"
  adam_mapping:
    required_variables: [USUBJID, TRT01PN, DVCAT, DVDESC, DVSTDY, DVENDY, DVSEV, SAFFL]
    population_flag: SAFFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADPD or custom PD dataset
  tcg_rules:
    - id: TCG-01
      desc: "Population filter SAFFL=Y (or all enrolled if safety pop)"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-24
      desc: "PD categories from standard taxonomy: Eligibility, Visit Window, Prohibited Med, Dose Modification, Consent, Endpoint"
      critical: true
    - id: TCG-25
      desc: "Severity classification: Critical, Major, Minor"
      critical: true
    - id: TCG-26
      desc: "Each PD record includes: subject ID, arm, category, description, study day, severity"
      critical: true
    - id: TCG-27
      desc: "Listing sorted by USUBJID"
      critical: false
    - id: TCG-28
      desc: "Summary: n subjects with >=1 PD, n total PDs, breakdown by category and severity"
      critical: true
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Listing numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population and scope (key protocol deviations)"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: PD categorization schema, severity definitions"
      penalty: 0.1
    - id: CSR-13
      desc: "Column headers: Subject ID, Treatment, Category, Description, Study Day, Severity"
      penalty: 0.1
    - id: CSR-14
      desc: "Summary table precedes or follows listing with counts by category/severity"
      penalty: 0.15

# ─────────────────────────────────────────────────────
# TC-015: Kaplan-Meier Curve with Risk Table
# ─────────────────────────────────────────────────────
TC-015:
  description: "KM Curve with Risk Table — survival curve coordinates + at-risk counts"
  adam_mapping:
    required_variables: [AVAL, CNSR, TRT01PN, ITTFL]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADTTE
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-03
      desc: "CNSR 0=event 1=censored"
      critical: true
    - id: TCG-04
      desc: "Analysis time AVAL specified"
      critical: true
    - id: TCG-29
      desc: "Risk table counts at each specified time point per arm"
      critical: true
    - id: TCG-30
      desc: "Curve coordinates include time, survival estimate, upper CI, lower CI"
      critical: true
    - id: TCG-31
      desc: "Separate curves per treatment arm"
      critical: true
    - id: TCG-32
      desc: "Log-rank test reported alongside KM curve"
      critical: false
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Figure numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population and endpoint (PFS/OS)"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: KM method, log-rank test, CI method, number at risk"
      penalty: 0.1
    - id: CSR-15
      desc: "X-axis: time since randomization; Y-axis: probability of survival"
      penalty: 0.1
    - id: CSR-16
      desc: "Risk table below x-axis with counts per arm at each time point"
      penalty: 0.15
    - id: CSR-17
      desc: "Median survival and CI reported in text or annotation"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-016: Exposure Summary Table
# ─────────────────────────────────────────────────────
TC-016:
  description: "Exposure Summary — duration, cumulative dose, dose intensity per arm"
  adam_mapping:
    required_variables: [USUBJID, TRT01PN, SAFFL, EXDUR, EXDOSE, EXTRT]
    population_flag: SAFFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADEX or EX domain
  tcg_rules:
    - id: TCG-01
      desc: "Population filter SAFFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-33
      desc: "Exposure duration (EXDUR) computed per subject"
      critical: true
    - id: TCG-34
      desc: "Cumulative dose (total mg) computed per subject"
      critical: true
    - id: TCG-35
      desc: "Dose intensity = actual / planned dose (%)"
      critical: true
    - id: TCG-36
      desc: "Relative dose intensity (RDI) computed where applicable"
      critical: true
    - id: TCG-37
      desc: "Summary stats: n, mean, SD, median, min, max for continuous measures"
      critical: false
    - id: TCG-38
      desc: "Dose reduction categories tabulated (if applicable)"
      critical: false
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes safety population and exposure metric"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: dose units, duration definition, planned dose reference"
      penalty: 0.1
    - id: CSR-18
      desc: "Per-arm N in column headers"
      penalty: 0.1
    - id: CSR-19
      desc: "Dose intensity <80% flagged or summarized separately"
      penalty: 0.15

# ─────────────────────────────────────────────────────
# TC-017: Laboratory Shift Table
# ─────────────────────────────────────────────────────
TC-017:
  description: "Lab Shift Table — baseline vs worst post-baseline (LOW/NORMAL/HIGH)"
  adam_mapping:
    required_variables: [USUBJID, TRT01PN, SAFFL, LBTESTCD, LBGRESCAT, LBBLFL, VISIT]
    population_flag: SAFFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADLB or LB domain
  tcg_rules:
    - id: TCG-01
      desc: "Population filter SAFFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-39
      desc: "Baseline category derived from LBBLFL=Y or first post-dose visit"
      critical: true
    - id: TCG-40
      desc: "Post-baseline category = worst post-baseline value (most extreme deviation)"
      critical: true
    - id: TCG-41
      desc: "Categories: LOW, NORMAL, HIGH based on reference range"
      critical: true
    - id: TCG-42
      desc: "3x3 shift matrix: rows=baseline (LOW/NORMAL/HIGH), cols=post-baseline (LOW/NORMAL/HIGH)"
      critical: true
    - id: TCG-43
      desc: "Subject-level de-duplication: each subject counted once per lab test"
      critical: true
    - id: TCG-44
      desc: "Per-arm and overall shift tables produced"
      critical: false
    - id: TCG-45
      desc: "Percentages computed using appropriate denominator (row, column, or overall)"
      critical: false
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes lab test, population, and shift direction"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: reference range, category definitions, denominator basis"
      penalty: 0.1
    - id: CSR-20
      desc: "Row and column totals included"
      penalty: 0.1
    - id: CSR-21
      desc: "Per-arm tables side-by-side or stacked with clear labeling"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-018: Change from Baseline Table
# ─────────────────────────────────────────────────────
TC-018:
  description: "Change from Baseline — longitudinal efficacy, visit-wise summary + treatment comparison"
  adam_mapping:
    required_variables: [USUBJID, TRT01PN, ITTFL, PARAMCD, AVAL, BASE, CHG, VISIT, VISITNUM]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
    domain: ADBS or ADQS (efficacy)
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-46
      desc: "Baseline (BASE) value computed per subject from baseline visit"
      critical: true
    - id: TCG-47
      desc: "Change from baseline (CHG = AVAL - BASE) computed at each post-baseline visit"
      critical: true
    - id: TCG-48
      desc: "Visit ordering by VISITNUM (baseline, week 6, 12, 18, 24)"
      critical: true
    - id: TCG-49
      desc: "Summary stats per visit per arm: n, mean, SD, median, 95% CI"
      critical: true
    - id: TCG-50
      desc: "Treatment comparison at each visit (t-test or ANCOVA with baseline covariate)"
      critical: true
    - id: TCG-51
      desc: "p-value reported per visit treatment comparison"
      critical: false
    - id: TCG-52
      desc: "Subjects with missing baseline or missing post-baseline excluded from respective visit"
      critical: true
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population, endpoint, and analysis method"
      penalty: 0.2
    - id: CSR-03
      desc: "Footnotes: analysis model (t-test/ANCOVA), baseline covariate, multiple comparison adjustment"
      penalty: 0.1
    - id: CSR-22
      desc: "Visit columns ordered chronologically with baseline first"
      penalty: 0.1
    - id: CSR-23
      desc: "Each cell: n, mean (SD), and treatment difference p-value"
      penalty: 0.15
    - id: CSR-24
      desc: "Missing data handling stated in footnotes"
      penalty: 0.1

# ─────────────────────────────────────────────────────
# TC-019: Concomitant Medications Summary Table
# ─────────────────────────────────────────────────────
TC-019:
  description: "Concomitant Medications Summary — by ATC class and preferred name, safety population"
  adam_mapping:
    required_variables: [USUBJID, ATCCLASS, CMDECOD, CMINDC, TRT01PN, SAFFL]
    population_flag: SAFFL
    population_value: Y
    treatment_variable: TRT01PN
  tcg_rules:
    - id: TCG-53
      desc: "Population filter SAFFL=Y"
      critical: true
    - id: TCG-54
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-55
      desc: "ATC class (ATCCLASS) mapped to WHO ATC classification"
      critical: true
    - id: TCG-56
      desc: "Medication decoded name (CMDECOD) — not verbatim term"
      critical: true
    - id: TCG-57
      desc: "Subject de-duplication: each subject counted once per medication"
      critical: true
    - id: TCG-58
      desc: "ATC classes sorted alphabetically by code"
      critical: false
    - id: TCG-59
      desc: "Medications within ATC class sorted by descending frequency"
      critical: false
    - id: TCG-60
      desc: "Summary row: Any CM (subjects with >=1 concomitant medication)"
      critical: true
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population, medication class, and analysis method"
      penalty: 0.2
    - id: CSR-25
      desc: "Columns: n (%), sorted by ATC class then medication"
      penalty: 0.1
    - id: CSR-26
      desc: "Footnotes: ATC version, denominator definition, subject de-duplication rule"
      penalty: 0.1
    - id: CSR-27
      desc: "Percentage based on safety population N per arm (not total CM records)"
      penalty: 0.15

# ─────────────────────────────────────────────────────
# TC-020: ORR by Subgroup
# ─────────────────────────────────────────────────────
TC-020:
  description: "ORR by Subgroup — objective response rate by pre-specified subgroups with CMH interaction test"
  adam_mapping:
    required_variables: [USUBJID, TRT01PN, ITTFL, AVAL, BOR, SEX, AGEGR1, ECOG]
    population_flag: ITTFL
    population_value: Y
    treatment_variable: TRT01PN
  tcg_rules:
    - id: TCG-01
      desc: "Population filter ITTFL=Y"
      critical: true
    - id: TCG-02
      desc: "Treatment variable TRT01PN"
      critical: true
    - id: TCG-61
      desc: "ORR defined as CR+PR (RECIST 1.1 response criteria)"
      critical: true
    - id: TCG-62
      desc: "Subgroups pre-specified: SEX, AGEGR1, ECOG"
      critical: true
    - id: TCG-63
      desc: "Wilson score CI for each subgroup-level ORR"
      critical: false
    - id: TCG-64
      desc: "Risk difference (Experimental - Control) with 95% CI per subgroup"
      critical: true
    - id: TCG-65
      desc: "Cochran-Mantel-Haenszel (CMH) interaction test for treatment-by-subgroup"
      critical: true
    - id: TCG-66
      desc: "Subgroup N must sum to overall N (no subjects lost in subgrouping)"
      critical: true
    - id: TCG-67
      desc: "Overall ORR reported alongside subgroup-level ORR"
      critical: true
    - id: TCG-06
      desc: "Software version documented"
      critical: false
  csr_rules:
    - id: CSR-01
      desc: "Table numbered per ICH E3 appendix"
      penalty: 0.1
    - id: CSR-02
      desc: "Title includes population, endpoint (ORR), and subgroup variables"
      penalty: 0.2
    - id: CSR-28
      desc: "Each row: subgroup level, n/N (%), 95% CI, risk difference (95% CI)"
      penalty: 0.15
    - id: CSR-29
      desc: "CMH interaction p-value reported for each subgroup variable"
      penalty: 0.1
    - id: CSR-30
      desc: "Footnotes: RECIST 1.1 criteria, CI method, CMH test description"
      penalty: 0.1

TC-023:
  adam_mapping:
    required_variables: [USUBJID, STUDYID, TRT01PN, BOR, ITTFL]
    population_flag: ITTFL
    population_value: "Y"
    treatment_variable: TRT01PN
    derived_variables:
      - name: AVAL_DCR
        desc: "1 if BOR in (CR, PR, SD), 0 otherwise"
      - name: AVAL_ORR
        desc: "1 if BOR in (CR, PR), 0 otherwise"
  tcg_rules:
    - id: TCG-68
      desc: "ITT population filter (ITTFL = 'Y') applied"
      critical: true
    - id: TCG-69
      desc: "Treatment variable TRT01PN used"
      critical: true
    - id: TCG-70
      desc: "DCR defined as CR+PR+SD (best overall response)"
      critical: true
    - id: TCG-71
      desc: "Wilson score CI method for binomial proportion"
      critical: true
    - id: TCG-72
      desc: "Risk difference (Experimental - Control) with 95% CI"
      critical: true
    - id: TCG-73
