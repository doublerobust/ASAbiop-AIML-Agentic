# safety.yaml — Safety & Robustness Check Rules per Test Case
# Part of the ASA Biopharm AI/ML WG Agentic AI Benchmark
# Reference: benchmarks/safety-robustness.md

meta:
  version: "0.4"
  updated: "2026-06-28"

# ──────────────────────────────────────────────────────
# N-count consistency rules by test case
# ──────────────────────────────────────────────────────
n_count_rules:
  TC-001:
    rules:
      - id: N-001
        desc: "n_events must be ≤ n_total"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Event + censored must sum to N"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Arm-level N sums must match overall N"
        critical: false
        auto_score: true
  TC-002:
    rules:
      - id: N-001
        desc: "n_total must match between arms and overall"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Total N must be consistent with demo table header"
        critical: false
        auto_score: true
  TC-003:
    rules:
      - id: N-001
        desc: "n_events must be ≤ n_total per stratum"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Cross-stratum N must sum to total"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Arm-level N sums must match overall N"
        critical: false
        auto_score: true
  TC-011:
    rules:
      - id: N-001
        desc: "n_subjects_with_ae must be ≤ n_total per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Summary row counts (Any AE, SAE, disc.) must be ≤ total safety N"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Per-PT n ≤ per-arm N (no subject counted twice for same PT)"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Arm-level N must match between summary rows and detail rows"
        critical: false
        auto_score: true
  TC-012:
    rules:
      - id: N-001
        desc: "n_events per subgroup must be ≤ n_total per subgroup per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Subgroup N must sum to overall N (no subject lost in subgrouping)"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Overall HR computed from full ITT population (not subgroup subset)"
        critical: true
        auto_score: true
  TC-013:
    rules:
      - id: N-001
        desc: "n_subjects in response categories (CR+PR+SD+PD) must equal total evaluable N"
        critical: true
        auto_score: true
      - id: N-002
        desc: "ORR (CR+PR) and DCR (CR+PR+SD) counts must be ≤ total N"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Subjects with missing baseline or no post-baseline excluded from waterfall"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Per-arm N must sum to overall N"
        critical: false
        auto_score: true
  TC-014:
    rules:
      - id: N-001
        desc: "n_subjects_with_pd must be ≤ n_total per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "n_total_deviations ≥ n_subjects_with_pd (subjects can have multiple PDs)"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Category counts must sum to n_total_deviations"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Severity counts must sum to n_total_deviations"
        critical: true
        auto_score: true
      - id: N-005
        desc: "Arm-level PD counts must sum to overall PD count"
        critical: false
        auto_score: true
  TC-015:
    rules:
      - id: N-001
        desc: "Risk table n_at_risk must be ≤ n_total per arm at each time point"
        critical: true
        auto_score: true
      - id: N-002
        desc: "n_at_risk must be non-increasing over time within each arm"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Events + censored at each time point must sum to n_at_risk reduction"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Arm-level N sums must match overall N"
        critical: false
        auto_score: true
  TC-016:
    rules:
      - id: N-001
        desc: "n_subjects with exposure data must be ≤ n_total safety population per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Each subject appears once per arm (no duplicate exposure records)"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Dose intensity must be between 0% and 150% (physiologically plausible)"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Exposure duration must be > 0 for all subjects"
        critical: true
        auto_score: true
  TC-017:
    rules:
      - id: N-001
        desc: "Sum of all 9 cells in 3x3 shift matrix must equal n_subjects per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Row totals (baseline categories) must sum to n_subjects per arm"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Column totals (post-baseline categories) must sum to n_subjects per arm"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Each subject classified once (no duplicates in shift table)"
        critical: true
        auto_score: true
      - id: N-005
        desc: "Arm-level N must sum to overall N"
        critical: false
        auto_score: true
  TC-018:
    rules:
      - id: N-001
        desc: "n_subjects per visit must be ≤ n_total ITT population per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "n_subjects must be non-increasing across visits (dropout/missing data)"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Baseline visit n must equal ITT N (all subjects have baseline)"
        critical: true
        auto_score: true
      - id: N-004
        desc: "CHG = AVAL - BASE at each visit (arithmetic consistency)"
        critical: true
        auto_score: true
      - id: N-005
        desc: "Arm-level N must sum to overall N at each visit"
        critical: false
        auto_score: true
  TC-019:
    rules:
      - id: N-001
        desc: "n_subjects_with_cm must be ≤ n_total safety population per arm"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Each subject appears once per medication (no duplicate CM records per subject per medication)"
        critical: true
        auto_score: true
      - id: N-003
        desc: "ATC class-level n_subjects must sum to ≤ total safety N (subjects can be in multiple ATC classes)"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Arm-level N must match between summary rows and detail rows"
        critical: false
        auto_score: true
  TC-020:
    rules:
      - id: N-001
        desc: "Subgroup N must sum to overall N per arm (no subjects lost in subgrouping)"
        critical: true
        auto_score: true
      - id: N-002
        desc: "Responders (CR+PR) must be ≤ subgroup N per arm"
        critical: true
        auto_score: true
      - id: N-003
        desc: "Overall ORR responders must equal sum of subgroup responders"
        critical: true
        auto_score: true
      - id: N-004
        desc: "Risk difference CI must contain the point estimate"
        critical: true
        auto_score: true

# ──────────────────────────────────────────────────────
# Denominator / population rules per test case
# ──────────────────────────────────────────────────────
denominator_rules:
  TC-001:
    expected_population: ITT
    flag: ITTFL
    critical: true
  TC-002:
    expected_population: SAFETY
    flag: SAFFL
    critical: true
  TC-003:
    expected_population: ITT
    flag: ITTFL
    critical: true
  TC-011:
    expected_population: SAFETY
    flag: SAFFL
    critical: true
  TC-012:
    expected_population: ITT
    flag: ITTFL
    critical: true
  TC-013:
    expected_population: ITT
    flag: ITTFL
    critical: true
  TC-014:
    expected_population: SAFETY
    flag: SAFFL
    critical: true
  TC-015:
    expected_population: ITT
    flag: ITTFL
    critical: true
  TC-016:
    expected_population: SAFETY
    flag: SAFFL
    critical: true
  TC-017:
    expected_population: SAFETY
    flag: SAFFL
    critical: true
  TC-018:
    expected_population: ITT
    flag: ITTFL
    critical: true
  TC-019:
    expected_population: SAFETY
    flag: SAFFL
    critical: true
  TC-020:
    expected_population: ITT
    flag: ITTFL
    critical: true

# ──────────────────────────────────────────────────────
# Cross-TFL agreement pairs that should be checked
# ──────────────────────────────────────────────────────
cross_tfl_pairs:
  - source: TC-001
    target: TC-003
    shared_fields: [n_events, n_total]
    description: "Event count and total N must agree between KM and log-rank"
  - source: TC-001
    target: TC-002
    shared_fields: [n_total]
    description: "Total N must be consistent (TC-001 ITT ≤ TC-002 Safety)"
  - source: TC-011
    target: TC-002
    shared_fields: [n_total]
    description: "Safety population N must be consistent between AE table and demographics table"
  - source: TC-012
    target: TC-001
    shared_fields: [n_events, n_total]
    description: "Event count and total N must agree between forest plot HR and KM median"
  - source: TC-012
    target: TC-003
    shared_fields: [n_events, n_total]
    description: "Overall HR from Cox PH and log-rank test must use same ITT population"
  - source: TC-013
    target: TC-002
    shared_fields: [n_total]
    description: "Waterfall plot N must be ≤ ITT N from demographics (evaluable subset)"
  - source: TC-014
    target: TC-002
    shared_fields: [n_total]
    description: "PD listing N must be ≤ safety population N from demographics"
  - source: TC-015
    target: TC-001
    shared_fields: [n_events, n_total]
    description: "KM curve and KM median must use same ITT population and event counts"
  - source: TC-015
    target: TC-003
    shared_fields: [n_events, n_total]
    description: "KM curve log-rank must match TC-003 stratified log-rank (if unstratified in TC-015)"
  - source: TC-016
    target: TC-002
    shared_fields: [n_total]
    description: "Exposure table N must match safety population N from demographics"
  - source: TC-016
    target: TC-011
    shared_fields: [n_total]
    description: "Exposure table safety N must match AE summary table safety N"
  - source: TC-017
    target: TC-002
    shared_fields: [n_total]
    description: "Lab shift table N must be ≤ safety population N (subjects with lab data)"
  - source: TC-018
    target: TC-001
    shared_fields: [n_total]
    description: "CFB table ITT N must match KM/table N (same ITT population)"
  - source: TC-018
    target: TC-013
    shared_fields: [n_total]
    description: "CFB table ITT N must be ≥ waterfall plot N (waterfall = evaluable subset)"
  - source: TC-019
    target: TC-002
    shared_fields: [n_total]
    description: "Concomitant medications N must match safety population N from demographics"
  - source: TC-019
    target: TC-011
    shared_fields: [n_total]
    description: "Concomitant medications safety N must match AE summary table safety N"
  - source: TC-020
    target: TC-013
    shared_fields: [n_total]
    description: "ORR by subgroup ITT N must be ≥ waterfall plot evaluable N"
  - source: TC-020
    target: TC-001
    shared_fields: [n_total]
    description: "ORR by subgroup ITT N must match KM median ITT N"

# ──────────────────────────────────────────────────────
# Edge case resilience expectations
# ──────────────────────────────────────────────────────
edge_case_expectations:
  non_estimable_median:
    expected_behavior: "flag or return NA"
    score_if_met: 1.0
    score_if_not: 0.0
  zero_event_stratum:
    expected_behavior: "exclude stratum gracefully"
    score_if_met: 1.0
    score_if_not: 0.5
  missing_covariate:
    expected_behavior: "flag or exclude with warning"
    score_if_met: 1.0
    score_if_not: 0.0
  empty_arm:
    expected_behavior: "flag as non-comparable"
    score_if_met: 1.0
    score_if_not: 0.5
  zero_ae_in_soc:
    expected_behavior: "omit SOC or show zero row with dash"
    score_if_met: 1.0
    score_if_not: 0.5
  non_converged_cox:
    expected_behavior: "flag non-convergence, report HR as NA"
    score_if_met: 1.0
    score_if_not: 0.0
  all_pd_same_category:
    expected_behavior: "listing and summary still correct with single category"
    score_if_met: 1.0
    score_if_not: 0.5
  subject_with_no_post_baseline:
    expected_behavior: "exclude from waterfall, include in exclusions count"
    score_if_met: 1.0
    score_if_not: 0.0
  non_estimable_curve_segment:
    expected_behavior: "flag or truncate curve when no subjects at risk beyond last event"
    score_if_met: 1.0
    score_if_not: 0.5
  zero_subjects_in_risk_set:
    expected_behavior: "risk table shows 0 at risk for time points beyond last follow-up"
    score_if_met: 1.0
    score_if_not: 0.0
  dose_intensity_above_100:
    expected_behavior: "flag dose intensity >100% (potential dosing error)"
    score_if_met: 1.0
    score_if_not: 0.5
  subject_with_no_exposure:
    expected_behavior: "exclude from exposure summary, include in denominator count"
    score_if_met: 1.0
    score_if_not: 0.0
  all_normal_baseline:
    expected_behavior: "shift table correctly shows all subjects in NORMAL/NORMAL cell"
    score_if_met: 1.0
    score_if_not: 0.5
  subject_missing_baseline_lab:
    expected_behavior: "exclude from shift table, include in exclusions"
    score_if_met: 1.0
    score_if_not: 0.0
  all_subjects_discontinue_before_end:
    expected_behavior: "CFB table n_subjects decreases to 0 at later visits"
    score_if_met: 1.0
    score_if_not: 0.5
  baseline_equals_post_baseline:
    expected_behavior: "CHG=0 handled correctly (not excluded as missing)"
    score_if_met: 1.0
    score_if_not: 0.5
  subject_with_no_concomitant_meds:
    expected_behavior: "included in denominator but not in any CM detail row"
    score_if_met: 1.0
    score_if_not: 0.5
  all_subjects_same_atc_class:
    expected_behavior: "table correctly shows single ATC class with all subjects"
    score_if_met: 1.0
    score_if_not: 0.5
  zero_responders_in_subgroup:
    expected_behavior: "ORR=0% with Wilson CI lower bound 0, risk difference reported"
    score_if_met: 1.0
    score_if_not: 0.5
  all_responders_in_subgroup:
    expected_behavior: "ORR=100% with Wilson CI upper bound 100, risk difference reported"
    score_if_met: 1.0
    score_if_not: 0.5
  zero_dc_in_subgroup:
    expected_behavior: "DCR=0% with Wilson CI lower bound 0, risk difference reported"
    score_if_met: 1.0
    score_if_not: 0.5
  all_dc_in_subgroup:
    expected_behavior: "DCR=100% with Wilson CI upper bound 100, risk difference reported"
    score_if_met: 1.0
    score_if_not: 0.5
  dcr_less_than_orr:
    expected_behavior: "DCR >= ORR always; if not, flag as data inconsistency"
    score_if_met: 1.0
    score_if_not: 0.0

# TC-023: Disease Control Rate (DCR)
TC-023:
  n_count_rules:
    - id: N-001
      desc: "Subgroup N sums to overall N for each arm"
      severity: critical
    - id: N-002
      desc: "disease_controlled count <= n per arm (no more controlled than enrolled)"
      severity: critical
    - id: N-003
      desc: "BOR category counts sum to arm N"
      severity: major
    - id: N-004
      desc: "disease_controlled_exp + disease_controlled_ctrl consistent with DCR computation"
      severity: major
  denominator:
    expected_population: ITT
    expected_flag: ITTFL
    expected_value: "Y"
  cross_tfl_agreement:
    - pair: [TC-023, TC-020]
      rule: "DCR >= ORR (every responder also has disease control)"
      severity: critical
    - pair: [TC-023, TC-001]
      rule: "ITT N from DCR matches ITT N from KM median"
      severity: major
  edge_case_expectations:
    zero_dc_in_subgroup:
      expected_behavior: "DCR=0% with Wilson CI lower bound 0, risk difference reported"
      score_if_met: 1.0
      score_if_not: 0.5
    all_dc_in_subgroup:
      expected_behavior: "DCR=100% with Wilson CI upper bound 100, risk difference reported"
      score_if_met: 1.0
      score_if_not: 0.5
    no_sd_patients:
      expected_behavior: "DCR = ORR when no SD patients exist"
      score_if_met: 1.0
      score_if_not: 0.5
    all_pd_patients:
      expected_behavior: "DCR=0% in both arms, difference=0"
      score_if_met: 1.0
      score_if_not: 0.0

# ──────────────────────────────────────────────────────
# Scoring weights for composite safety score
# ──────────────────────────────────────────────────────
scoring_weights:
  n_count_consistency: 0.30
  denominator_correctness: 0.35
  cross_tfl_agreement: 0.15
  edge_case_resilience: 0.20

# ──────────────────────────────────────────────────────
# TC-024: Overall Survival — Safety Rules
# ──────────────────────────────────────────────────────
TC-024:
  n_count_rules:
    - id: N-005
      desc: "OS n_events + n_censored = n_total (ITT)"
      severity: critical
    - id: N-006
      desc: "OS n_total matches ITT population count"
      severity: critical
    - id: N-007
      desc: "OS n_events <= n_total (cannot have more events than subjects)"
      severity: critical
  denominator:
    expected_population: ITT
    expected_flag: ITTFL
    expected_value: "Y"
  cross_tfl_agreement:
    - pair: [TC-024, TC-001]
      rule: "ITT N from OS matches ITT N from PFS (same study population)"
      severity: major
    - pair: [TC-024, TC-015]
      rule: "OS KM curve N at risk table consistent with OS median N"
      severity: major
  edge_case_expectations:
    no_deaths_in_arm:
      expected_behavior: "Median OS = NA, reported as not reached with CI"
      score_if_met: 1.0
      score_if_not: 0.0
    all_events:
      expected_behavior: "Event rate = 1.0, no censoring, median computable"
      score_if_met: 1.0
      score_if_not: 0.5
    small_subgroup:
      expected_behavior: "Subgroup n<10: CI may be wide, HR may not converge"
      score_if_met: 1.0
      score_if_not: 0.5

# ──────────────────────────────────────────────────────
# TC-025: BOR Summary — Safety Rules
# ──────────────────────────────────────────────────────
TC-025:
  n_count_rules:
    - id: N-008
      desc: "BOR counts (CR+PR+SD+PD+NE) = n_total per arm"
      severity: critical
    - id: N-009
      desc: "ORR_n = CR + PR"
      severity: critical
    - id: N-010
      desc: "DCR_n = CR + PR + SD"
      severity: critical
    - id: N-011
      desc: "n_evaluable = n_total - NE"
      severity: major
  denominator:
    expected_population: ITT
    expected_flag: ITTFL
    expected_value: "Y"
  cross_tfl_agreement:
    - pair: [TC-025, TC-020]
      rule: "ORR in BOR summary matches ORR by subgroup (TC-020 overall)"
      severity: critical
    - pair: [TC-025, TC-023]
      rule: "DCR in BOR summary matches DCR (TC-023 overall)"
      severity: critical
    - pair: [TC-025, TC-013]
      rule: "BOR distribution consistent with waterfall plot subjects"
      severity: major
  edge_case_expectations:
    no_responders:
      expected_behavior: "ORR=0% with Clopper-Pearson CI [0, upper], DCR may be nonzero"
      score_if_met: 1.0
      score_if_not: 0.0
    all_responders:
      expected_behavior: "ORR=100% with CI upper=1.0, DCR=100%"
      score_if_met: 1.0
      score_if_not: 0.5
    all_ne:
      expected_behavior: "n_evaluable=0, ORR and DCR reported as NA/undefined"
      score_if_met: 1.0
      score_if_not: 0.0
