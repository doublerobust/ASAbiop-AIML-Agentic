# ────────────────────────────────────────────────────────────
# Language-specific adjustment factors
# Used to normalize efficiency scores across languages
# ────────────────────────────────────────────────────────────
language_adjustments:
  R:
    # 10% faster coding due to Pharmaverse ecosystem
    time_factor: 0.9
    # Average validation/setup overhead (renv lockfile)
    validation_overhead_min: 3.0
    notes: Package version lockfile needed (renv); CRAN quality gate
  SAS:
    # 30% slower LLM generation due to smaller training data footprint
    time_factor: 1.3
    # Minimal validation overhead; built-in, no versioning
    validation_overhead_min: 1.5
    notes: Proprietary license required; cannot run in open CI/CD
  Python:
    # 15% faster LLM generation due to largest training data footprint
    time_factor: 0.85
    # Environment reproduction overhead (uv/conda lock)
    validation_overhead_min: 5.0
    notes: PyPI lacks CRAN quality gate; larger env. space

# ────────────────────────────────────────────────────────────
# Reference efficiency targets for score normalization
# ────────────────────────────────────────────────────────────
efficiency_targets:
  level_1:
    cost_target_usd: 0.10
    time_target_min: 2.0
    test_cases: [TC-001, TC-002, TC-003]
  level_2:
    cost_target_usd: 2.00
    time_target_min: 10.0
    test_cases: [TC-004, TC-005, TC-006]
  level_3:
    cost_target_usd: 5.00
    time_target_min: 30.0
    test_cases: [TC-007, TC-008, TC-009, TC-010]

